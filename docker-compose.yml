services:
  traefik:
    image: traefik:v3
    container_name: app_traefik
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
      - "${TRAEFIK_DASHBOARD_PORT:-8080}:8080"
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=app_network"
      - "--providers.file.filename=/etc/traefik/dynamic.yml"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./docker/traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro"
      - "./docker/nginx/certs:/certs:ro"
    networks:
      - app_network

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: app_php
    volumes:
      - ./app/api:/var/www/html
      - ./.env:/var/www/html/.env:ro
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    environment:
      - APP_ENV=${APP_ENV:-dev}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_network

  nginx:
    image: nginx:stable-alpine
    container_name: app_nginx
    volumes:
      - ./app/api:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - php
    labels:
      - "traefik.enable=true"
      # HTTPS route — backend is nginx:443, skip self-signed cert verification
      - "traefik.http.routers.api.rule=Host(`api.localhost`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls=true"
      - "traefik.http.services.api.loadbalancer.server.port=443"
      - "traefik.http.services.api.loadbalancer.server.scheme=https"
      - "traefik.http.services.api.loadbalancer.serversTransport=skipVerify@file"
    networks:
      - app_network

  postgres:
    image: postgres:17-alpine
    container_name: app_postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-app}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app_network

  worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: app_worker
    command: >
      sh -c "while true; do
        php bin/console messenger:consume async --time-limit=3600 -vv;
        sleep 3;
      done"
    volumes:
      - ./app/api:/var/www/html
      - ./.env:/var/www/html/.env:ro
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    environment:
      - APP_ENV=${APP_ENV:-dev}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_network
    restart: unless-stopped

  client:
    build:
      context: ./docker/client
    container_name: app_client
    volumes:
      - ./app/client:/app
      - client_node_modules:/app/node_modules
      - client_next:/app/.next
    environment:
      - NEXT_PUBLIC_ENTRYPOINT=${NEXT_PUBLIC_ENTRYPOINT:-https://api.localhost}
      - API_ENTRYPOINT=http://nginx/api
    depends_on:
      - nginx
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.client.rule=Host(`localhost`)"
      - "traefik.http.routers.client.entrypoints=websecure"
      - "traefik.http.routers.client.tls=true"
      - "traefik.http.services.client.loadbalancer.server.port=3000"
    networks:
      - app_network

volumes:
  postgres_data:
  client_node_modules:
  client_next:

networks:
  app_network:
    driver: bridge
